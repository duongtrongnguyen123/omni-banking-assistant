name: CI

on:
  push:
    branches: [main, feat/**]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend — NLU corpus + import sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Import sanity
        working-directory: backend
        env:
          OMNI_SKIP_EMBED_BACKFILL: "1"
        run: python -c "from app.main import app; assert len(app.routes) >= 20"

      - name: NLU corpus tests (rule fallback)
        working-directory: backend
        env:
          OMNI_SKIP_EMBED_BACKFILL: "1"
          GROQ_API_KEY: ""
          GEMINI_API_KEY: ""
        run: python -m pytest tests/test_nlu_corpus.py -v

      - name: End-to-end smoke (rule-only — LLMs disabled)
        working-directory: backend
        env:
          OMNI_SKIP_EMBED_BACKFILL: "1"
          GROQ_API_KEY: ""
          GEMINI_API_KEY: ""
        run: python scripts/smoke.py

  frontend-build:
    name: Frontend — TypeScript build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install + build
        working-directory: frontend
        run: |
          npm ci
          npm run build
